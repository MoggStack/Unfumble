server:
  port: 8080

spring:
  application:
    name: unfumble-gateway

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:unfumble}
    username: ${DB_USER:unfumble}
    password: ${DB_PASSWORD:unfumble123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # switch to 'validate' once schema is stable
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    openai:
      # Google Gemini free tier via OpenAI-compatible endpoint
      api-key: ${GEMINI_API_KEY:${OPENAI_API_KEY:PLACEHOLDER}}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
      chat:
        options:
          model: ${GEMINI_MODEL:gemini-2.5-flash}

# ── Application-level properties ─────────────────────────────────────────────

app:
  ai-engine:
    base-url: ${AI_ENGINE_URL:http://localhost:8001}

  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:unfumble-images}

# ── Logging ───────────────────────────────────────────────────────────────────

logging:
  level:
    com.unfumble.gateway: DEBUG
    org.springframework.security: INFO
